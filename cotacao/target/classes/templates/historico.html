<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="card">
        <h1>Histórico de Cotações</h1>
         
        <div th:each="c : ${lista}">
            <p> Produto:  <span th:text="${c.produto}"></span></p>
            <p> Valor Total:  <span th:text="${c.valorTotal}"></span></p>
            <p> Status: <span th:text="${c.status}"></span></p>
            <hr>
        </div>
    </div>
</body>
</html>
